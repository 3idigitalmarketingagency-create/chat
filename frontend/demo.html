<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FlyingFish Chatbot — Demo</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    html{height:100%}
    body{
      font-family:'Outfit',system-ui,sans-serif;
      min-height:100vh;
      display:flex;align-items:center;justify-content:center;
      color:#e0f2fe;
      overflow:hidden;
      background:#091520;
      position:relative;
    }
    /* animated gradient bg */
    body::before{
      content:'';position:absolute;inset:0;
      background:
        radial-gradient(ellipse 600px 400px at 20% 80%, rgba(13,148,136,0.18), transparent),
        radial-gradient(ellipse 500px 350px at 80% 20%, rgba(6,182,212,0.12), transparent),
        linear-gradient(170deg,#091520 0%,#0b1f33 50%,#0d3040 100%);
      z-index:0;
    }
    /* subtle noise */
    body::after{
      content:'';position:absolute;inset:0;
      background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      opacity:.025;z-index:1;pointer-events:none;
    }
    .demo{text-align:center;padding:40px 28px;max-width:520px;position:relative;z-index:2}
    .logo{font-size:3rem;margin-bottom:16px;filter:drop-shadow(0 0 20px rgba(6,182,212,0.3))}
    h1{
      font-size:2.2rem;font-weight:700;letter-spacing:1px;
      background:linear-gradient(135deg,#06b6d4,#34d399);
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;
      margin-bottom:12px;
    }
    p{font-size:1rem;opacity:.7;line-height:1.7;margin-bottom:6px;font-weight:400}
    .pill{
      display:inline-block;margin-top:28px;
      padding:10px 24px;border-radius:9999px;
      border:1px solid rgba(6,182,212,0.2);
      background:rgba(6,182,212,0.06);
      font-size:.82rem;color:#06b6d4;
      backdrop-filter:blur(8px);
      letter-spacing:.4px;
    }
    .arrow{
      margin-top:32px;font-size:1.6rem;opacity:.5;
      animation:bob 2s ease-in-out infinite;
    }
    @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(8px)}}
  </style>
</head>
<body>
  <div class="demo">
    <div class="logo">🤿</div>
    <h1>FlyingFish Scuba School</h1>
    <p>AI dive advisor &mdash; powered by GPT-4o-mini</p>
    <p>Click the chat bubble to talk to Laila</p>
    <div class="pill" id="status">Connecting...</div>
    <div class="arrow">&darr;</div>
  </div>

  <link rel="stylesheet" href="/widget/widget.css?v=2">
  <script>
    // Auto-detect API URL: use current origin when deployed, localhost for dev
    var apiUrl = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
      ? 'http://localhost:3001'
      : window.location.origin;
    document.write('<scr'+'ipt src="/widget/widget.js?v=2" data-api="'+apiUrl+'" defer><\/scr'+'ipt>');
    // Show status
    fetch(apiUrl + '/health').then(function(r){return r.json()}).then(function(){
      document.getElementById('status').textContent = 'Connected to ' + apiUrl;
    }).catch(function(){
      document.getElementById('status').textContent = 'Backend not reachable at ' + apiUrl;
    });
  </script>
</body>
</html>
