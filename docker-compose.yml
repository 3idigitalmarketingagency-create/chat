version: "3.8"

services:
  chatbot-api:
    build: ./backend
    container_name: flyingfish-chatbot
    restart: unless-stopped
    ports:
      - "3001:3001"
    env_file:
      - ./backend/.env
    volumes:
      - ./knowledge-base:/app/knowledge-base:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
