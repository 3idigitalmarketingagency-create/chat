<!--
  FlyingFish Chatbot — WordPress Embed Code

  HOW TO ADD TO WORDPRESS:
  1. Go to WordPress Admin > Appearance > Theme Editor > footer.php
     OR use "Insert Headers and Footers" plugin (recommended)
  2. Paste this code just before </body>
  3. Update YOUR-DOMAIN to your deployed backend URL

  OPTIONS on the <script> tag:
    data-api      — Chatbot backend URL (REQUIRED)
    data-position — "right" or "left" (default: right)
    data-avatar   — Custom avatar image URL
-->

<!-- FlyingFish AI Chatbot -->
<link rel="stylesheet" href="https://YOUR-DOMAIN.com/chatbot/widget.css">
<script
  src="https://YOUR-DOMAIN.com/chatbot/widget.js"
  data-api="https://YOUR-DOMAIN.com"
  data-avatar="https://lightcyan-hamster-760485.hostingersite.com/wp-content/uploads/laila-avatar.webp"
  defer
></script>
